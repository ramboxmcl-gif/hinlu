<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hīnlû-Jûd System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  background: #f5f7fa;
}

/* HEADER */
header {
  background: #1E2A32;
  color: white;
  padding: 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo {
  display:flex;
  align-items:center;
  gap:10px;
}

.logo-box {
  width:40px;
  height:40px;
  background:#00E676;
  border-radius:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
}

/* HERO */
.hero {
  text-align:center;
  padding:80px 20px;
}

.hero h1 {
  font-size:40px;
}

.btn {
  padding:12px 20px;
  background:#00E676;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* FEATURES */
.section {
  padding:60px 20px;
  text-align:center;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:30px;
}

.card {
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}
</style>

</head>

<body>

<header>
  <div class="logo">
    <div class="logo-box">HJ</div>
    <strong>Hīnlû-Jûd System</strong>
  </div>
</header>

<section class="hero">
  <h1>Laundry, Redefined</h1>
  <p>Smart logistics platform for laundry services</p>
  <button class="btn" onclick="scrollToBooking()">Get Started</button>
</section>

<section class="section">
  <h2>Our System</h2>

  <div class="grid">
    <div class="card">
      <h3>Customer Booking</h3>
      <p>Book laundry services easily</p>
    </div>

    <div class="card">
      <h3>Runner Delivery</h3>
      <p>Pickup and delivery system</p>
    </div>

    <div class="card">
      <h3>Shop Processing</h3>
      <p>QR-based tracking system</p>
    </div>
  </div>
</section>

<section class="section" id="booking">
  <h2>Book Laundry</h2>

  <input id="name" placeholder="Name"><br><br>
  <input id="address" placeholder="Address"><br><br>

  <button class="btn" onclick="createQR()">Book Now</button>

  <div id="qrcode" style="margin-top:20px;"></div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
function createQR(){
  let id = "ORDER-" + Date.now();
  document.getElementById("qrcode").innerHTML="";
  new QRCode(document.getElementById("qrcode"), id);
}

function scrollToBooking(){
  document.getElementById("booking").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
